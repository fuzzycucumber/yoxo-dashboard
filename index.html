<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Conso" />
<title>Ma Conso · Yoxo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<!-- App icon + manifest embedded as data URIs so the page is fully self-contained and installable from any host -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e0f13'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%23ff7a1a' stroke-width='10' stroke-dasharray='150 60' stroke-linecap='round' transform='rotate(-90 50 50)'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e0f13'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%23ff7a1a' stroke-width='10' stroke-dasharray='150 60' stroke-linecap='round' transform='rotate(-90 50 50)'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#0e0f13; --bg2:#15171e; --card:#181b23; --card2:#1e222c;
    --line:#272c38; --txt:#eef1f7; --mut:#9aa3b2; --mut2:#6c7688;
    --accent:#ff7a1a; --accent2:#ffb056;
    --ok:#37d39a; --warn:#ffcf5c; --bad:#ff5d6c; --blue:#5aa2ff;
    --r:20px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b1e27 0%,var(--bg) 55%) fixed,var(--bg);
    color:var(--txt);min-height:100dvh;line-height:1.4;
    padding:max(env(safe-area-inset-top),14px) 14px calc(env(safe-area-inset-bottom) + 24px);
    max-width:720px;margin:0 auto;
  }
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  .hidden{display:none !important}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ---------- Gate ---------- */
  #gate{position:fixed;inset:0;z-index:50;background:linear-gradient(180deg,#0e0f13,#0a0b0f);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:18px}
  #gate .logo{width:66px;height:66px;border-radius:18px;background:var(--card);display:grid;place-items:center;box-shadow:var(--shadow)}
  #gate h2{font-size:1.35rem}
  #gate p{color:var(--mut);margin:0;text-align:center;font-size:.92rem;max-width:280px}
  .pw-row{display:flex;gap:8px;width:100%;max-width:320px}
  input[type=password],input[type=text],input[type=number]{
    width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:14px;padding:14px 16px;font-size:1rem;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  .btn{background:var(--accent);color:#1a1206;font-weight:800;border-radius:14px;padding:0 18px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .15s;font-size:1rem}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--card);color:var(--txt);border:1px solid var(--line);font-weight:600}
  .btn.sm{height:40px;padding:0 14px;font-size:.9rem}
  #gateErr{color:var(--bad);font-size:.85rem;height:1em;margin:0}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 2px 18px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{width:42px;height:42px;border-radius:12px;background:var(--card);display:grid;place-items:center;box-shadow:var(--shadow)}
  .brand h1{font-size:1.18rem}
  .brand small{color:var(--mut);font-weight:600;font-size:.74rem;letter-spacing:.02em;display:block;margin-top:1px}
  .hbtns{display:flex;gap:8px}
  .icobtn{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--mut);transition:color .15s,border-color .15s}
  .icobtn:active{transform:scale(.95)}
  .icobtn.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .updated{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:.82rem;margin:0 4px 14px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px rgba(55,211,154,.14)}
  .dot.stale{background:var(--warn);box-shadow:0 0 0 4px rgba(255,207,92,.14)}

  /* ---------- Line card ---------- */
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:var(--r);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
  .card .who{display:flex;align-items:center;gap:12px;min-width:0}
  .avatar{width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;font-weight:800;color:#1a1206;
    background:linear-gradient(140deg,var(--accent),var(--accent2))}
  .avatar.b{background:linear-gradient(140deg,#5aa2ff,#8ec7ff)}
  .who .meta{min-width:0}
  .who .name{font-weight:800;font-size:1.02rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .num{color:var(--mut);font-size:.82rem;font-variant-numeric:tabular-nums}
  .plan{color:var(--accent2);font-size:.74rem;font-weight:700;border:1px solid #3a2c18;background:#241a0d;
    padding:4px 9px;border-radius:999px;white-space:nowrap}

  .hero{display:flex;align-items:center;gap:18px}
  .ring{position:relative;width:118px;height:118px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .ring .val{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1}
  .ring .unit{font-size:.72rem;color:var(--mut);font-weight:700;margin-top:3px}
  .ring .cap{font-size:.66rem;color:var(--mut2);margin-top:5px}
  .stats{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
  .stat .srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .stat .slab{display:flex;align-items:center;gap:7px;color:var(--mut);font-size:.82rem;font-weight:600}
  .stat .sval{font-weight:800;font-size:.92rem;font-variant-numeric:tabular-nums}
  .bar{height:8px;border-radius:999px;background:#0f1218;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar.voice > i{background:linear-gradient(90deg,#37d39a,#7ff0c2)}
  .bar.sms > i{background:linear-gradient(90deg,#5aa2ff,#a9ccff)}
  .inf{font-size:1.05rem;color:var(--ok);font-weight:800}

  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .foot .valid{color:var(--mut);font-size:.8rem}
  .foot .valid b{color:var(--txt);font-weight:700}
  .linkbtn{color:var(--mut);font-size:.82rem;font-weight:700;display:inline-flex;gap:6px;align-items:center}
  .linkbtn:active{color:var(--accent)}

  /* ---------- Editor ---------- */
  .editor{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:grid;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fld label{display:block;color:var(--mut);font-size:.72rem;font-weight:700;margin:0 0 5px 2px;text-transform:uppercase;letter-spacing:.04em}
  .fld .in2{display:flex;align-items:center;gap:6px}
  .fld .in2 span{color:var(--mut2);font-size:.8rem}
  .chk{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:.85rem;font-weight:600}
  .chk input{width:18px;height:18px;accent-color:var(--accent)}
  .ed-actions{display:flex;gap:8px;justify-content:flex-end}

  /* ---------- Sheet (settings) ---------- */
  .sheet-wrap{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
  .sheet{background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;
    width:100%;max-width:720px;padding:20px 18px calc(env(safe-area-inset-bottom) + 24px);box-shadow:0 -20px 40px rgba(0,0,0,.5)}
  .sheet h3{font-size:1.1rem;margin-bottom:4px}
  .sheet p{color:var(--mut);font-size:.86rem;margin:0 0 16px}
  .sheet .fld{margin-bottom:14px}
  .grabber{width:40px;height:4px;border-radius:999px;background:var(--line);margin:0 auto 16px}
  .note{color:var(--mut2);font-size:.76rem;line-height:1.5;background:#0f1218;border:1px solid var(--line);border-radius:12px;padding:11px 13px}

  /* ---------- Toast ---------- */
  #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 20px);transform:translateX(-50%) translateY(20px);
    background:#0b0c10;border:1px solid var(--line);color:var(--txt);padding:11px 16px;border-radius:12px;font-size:.88rem;
    font-weight:600;opacity:0;transition:.25s;z-index:60;box-shadow:var(--shadow);pointer-events:none;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .foot-note{text-align:center;color:var(--mut2);font-size:.72rem;margin-top:18px;line-height:1.6}
  /* two-ring line layout */
  .rings{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;padding:10px 0 2px}
  .rg{display:flex;flex-direction:column;align-items:center;gap:10px}
  .ring.sm{width:104px;height:104px}
  .ring.sm .val{font-size:1.34rem}
  .val .u{font-size:.7rem;color:var(--mut);font-weight:700;margin-left:1px}
  .rglab{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:.85rem;font-weight:700}
  .dim{color:var(--mut2)}
</style>
</head>
<body>

<!-- ===================== PASSWORD GATE ===================== -->
<div id="gate">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#ff7a1a" stroke-width="2" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
  </div>
  <div style="text-align:center">
    <h2>Ma Conso</h2>
    <p>Entrez le mot de passe pour afficher vos deux lignes.</p>
  </div>
  <form class="pw-row" id="gateForm" autocomplete="off">
    <input type="password" id="pw" placeholder="Mot de passe" autocomplete="current-password" />
    <button class="btn" type="submit">OK</button>
  </form>
  <p id="gateErr"></p>
</div>

<!-- ===================== APP ===================== -->
<main id="app" class="hidden">
  <header>
    <div class="brand">
      <div class="mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff7a1a" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div>
        <h1>Ma Conso</h1>
        <small>Data · Appels · SMS</small>
      </div>
    </div>
    <div class="hbtns">
      <button class="icobtn" id="btnRefresh" title="Rafraîchir" aria-label="Rafraîchir">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="icobtn" id="btnSettings" title="Réglages" aria-label="Réglages">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="updated"><span class="dot" id="freshDot"></span><span id="updatedTxt">—</span></div>

  <div id="cards"></div>

  <p class="foot-note" id="footNote"></p>
</main>

<div id="toast"></div>

<script>
"use strict";
/* =====================================================================
   Ma Conso — tableau de bord Yoxo (2 lignes)
   Fichier unique, sans dépendance serveur. Hébergeable sur GitHub Pages,
   Cloudflare Pages, ou tout hébergeur statique gratuit.

   SOURCES DE DONNÉES (par ordre de priorité, au chargement / rafraîchit) :
     1. ?data=<base64 JSON>  dans l'URL  (une automatisation du téléphone
        peut ouvrir un lien pré-rempli pour pousser les valeurs)
     2. DATA_URL distant (ex: data.json publié à côté de cette page)
     3. Cache local (localStorage) — dernières valeurs saisies/récupérées
     4. Données de démonstration (ci-dessous)
   La saisie manuelle (bouton "Modifier" sur chaque ligne) est toujours
   disponible et enregistrée localement — utile immédiatement, sans backend.

   SÉCURITÉ : le mot de passe est un simple verrou côté client (comparaison
   d'un hash SHA-256). Il n'expose AUCUN identifiant Yoxo (ceux-ci ne sont
   jamais stockés ici). Ce n'est pas une protection forte ; ne stockez ici
   que des chiffres de consommation.
   ===================================================================== */

const CONFIG = {
  // SHA-256 du mot de passe (démo = "yoxo2026"). Remplacez par le hash de
  // votre propre mot de passe (voir README) avant l'usage réel.
  PASSWORD_SHA256: "31df00f6fa4c1b569ce935aba8e25e444113b985d1a495fa2361845ae19e3c92",
  // URL d'un data.json auto-mis-à-jour par le téléphone (laisser "" pour désactiver).
  DATA_URL: "",
  // Les numéros ne sont PAS codés en dur (cette page est publique). Saisissez-les
  // sur l'appareil via ✎ Modifier ; ils restent dans localStorage, jamais dans le dépôt.
  LINES: [
    { id: "", label: "Ligne 1" },
    { id: "", label: "Ligne 2" }
  ]
};

// ---- Données de démonstration (remplacées dès qu'une vraie source existe) ----
const DEMO = {
  updatedAt: new Date(Date.now() - 6 * 3600e3).toISOString(),
  lines: [
    { id:"", label:"Ligne 1",
      data:{remaining:42.2,unit:"Go"},
      voice:{remaining:300,unit:"min"},
      validUntil:"2026-08-01",
      asOf: new Date(Date.now() - 6 * 3600e3).toISOString() },
    { id:"", label:"Ligne 2",
      data:{remaining:8.2,unit:"Go"},
      voice:{remaining:145,unit:"min"},
      validUntil:"2026-07-15",
      asOf: new Date(Date.now() - 26 * 3600e3).toISOString() }
  ]
};

const $ = (s, r=document) => r.querySelector(s);
const LSKEY = "maconso.data.v1";
const LSURL = "maconso.dataurl.v1";
let STATE = null;

/* ---------------- Password gate ---------------- */
async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
const SESSION = "maconso.ok";
async function checkPw(e){
  e && e.preventDefault();
  const v = $("#pw").value || "";
  const h = await sha256(v);
  if (h === CONFIG.PASSWORD_SHA256){
    try{ sessionStorage.setItem(SESSION,"1"); }catch(_){}
    openApp();
  } else {
    $("#gateErr").textContent = "Mot de passe incorrect.";
    $("#pw").select();
  }
}
function openApp(){
  $("#gate").classList.add("hidden");
  $("#app").classList.remove("hidden");
  boot();
}

/* ---------------- Data loading ---------------- */
function fromUrl(){
  try{
    const p = new URLSearchParams(location.search).get("data");
    if(!p) return null;
    const json = decodeURIComponent(escape(atob(p.replace(/-/g,"+").replace(/_/g,"/"))));
    return normalize(JSON.parse(json));
  }catch(_){ return null; }
}
function fromCache(){
  try{ const r = localStorage.getItem(LSKEY); return r ? normalize(JSON.parse(r)) : null; }catch(_){ return null; }
}
function save(state){
  try{ localStorage.setItem(LSKEY, JSON.stringify(state)); }catch(_){}
}
async function fromRemote(url){
  const u = url || localStorage.getItem(LSURL) || CONFIG.DATA_URL;
  if(!u) return null;
  const bust = u + (u.includes("?") ? "&" : "?") + "t=" + Date.now();
  const res = await fetch(bust, {cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return normalize(await res.json());
}
// Merge partial line data onto CONFIG.LINES so order & labels stay stable.
function normalize(raw){
  if(!raw || !Array.isArray(raw.lines)) return null;
  const byId = {};
  raw.lines.forEach(l => { if(l && l.id) byId[String(l.id)] = l; });
  const lines = CONFIG.LINES.map((meta,i) => {
    const src = (meta.id && byId[meta.id]) || raw.lines[i] || {};
    return {
      id: (src.id != null && src.id !== "") ? String(src.id) : meta.id,
      label: src.label || meta.label,
      plan: src.plan || "",
      data: bucket(src.data),
      voice: bucket(src.voice),
      sms: bucket(src.sms),
      validUntil: src.validUntil || "",
      asOf: src.asOf || null
    };
  });
  return { updatedAt: raw.updatedAt || new Date().toISOString(), lines };
}
function bucket(b){
  if(!b || typeof b !== "object") return null;
  if(b.unlimited) return {unlimited:true, unit:b.unit||""};
  const rem = num(b.remaining), tot = num(b.total);
  if(rem===null && tot===null) return null;
  return {remaining:rem, total:tot, unit:b.unit||""};
}
function num(x){ const n = parseFloat(x); return isFinite(n) ? n : null; }

/* ---------------- Rendering ---------------- */
function fmt(n){
  if(n===null||n===undefined) return "—";
  return (Math.round(n*10)/10).toLocaleString("fr-FR");
}
function pct(rem,tot){ if(!tot||tot<=0) return 0; return Math.max(0,Math.min(1, rem/tot)); }
function ringColor(p){ return p>.5?"var(--ok)":p>.2?"var(--warn)":"var(--bad)"; }

function relTime(iso){
  const d = new Date(iso), now = new Date(), s = (now-d)/1000;
  if(isNaN(s)) return "—";
  if(s<60) return "à l'instant";
  if(s<3600) return "il y a "+Math.floor(s/60)+" min";
  if(s<86400) return "il y a "+Math.floor(s/3600)+" h";
  return "il y a "+Math.floor(s/86400)+" j";
}
function validTxt(iso){
  if(!iso) return null;
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return null;
  const days = Math.ceil((d - new Date())/86400e3);
  const ds = d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
  return {ds, days};
}

function initials(s){ return (s||"L").trim().slice(0,2).toUpperCase(); }
function fmtVoice(min, unit){
  if(min===null||min===undefined) return "—";
  if(unit && unit!=="min") return `${fmt(min)}<span class="u">${esc(unit)}</span>`;
  const h=Math.floor(min/60), m=Math.round(min%60);
  if(h>0) return `${h}<span class="u">h</span>${String(m).padStart(2,"0")}`;
  return `${m}<span class="u">min</span>`;
}
function ringHtml(label, b, kind){
  const color = kind==="data" ? "var(--blue)" : "var(--ok)";
  const C = 2*Math.PI*46; // r=46
  let fill=1, center="—", sub="restant";
  if(!b){ fill=0; center=`<span style="font-size:1rem;color:var(--mut)">—</span>`; sub="non renseigné"; }
  else if(b.unlimited){ fill=1; center=`<span class="inf">∞</span>`; sub=label.toLowerCase(); }
  else {
    const rem=b.remaining;
    fill=(b.total>0)?Math.max(0,Math.min(1, rem/b.total)):1;
    center=(kind==="data")
      ? `${fmt(rem)}<span class="u">${esc(b.unit||"Go")}</span>`
      : fmtVoice(rem, b.unit);
  }
  const off=C*(1-fill);
  return `
    <div class="rg">
      <div class="ring sm">
        <svg width="104" height="104" viewBox="0 0 104 104">
          <circle cx="52" cy="52" r="46" fill="none" stroke="#0f1218" stroke-width="9"/>
          <circle cx="52" cy="52" r="46" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
        </svg>
        <div class="lab"><div class="val">${center}</div><div class="cap">${sub}</div></div>
      </div>
      <div class="rglab">${iconFor(kind)} ${label}</div>
    </div>`;
}
function lineCard(l, idx){
  const v = validTxt(l.validUntil);
  const showNum = l.id && !/^line\d+$/.test(l.id);
  return `
  <div class="card" data-idx="${idx}">
    <div class="top">
      <div class="who">
        <div class="avatar ${idx===1?'b':''}">${initials(l.label)}</div>
        <div class="meta">
          <div class="name">${esc(l.label)}</div>
          ${showNum ? `<div class="num">${esc(l.id)}</div>` : ``}
        </div>
      </div>
      ${l.plan ? `<div class="plan">${esc(l.plan)}</div>` : ``}
    </div>

    <div class="rings">
      ${ringHtml("Appels", l.voice, "voice")}
      ${ringHtml("Internet", l.data, "data")}
    </div>

    <div class="foot">
      <div class="valid">${ v ? `Réinit. le <b>${v.ds}</b>${v.days>=0?` · J-${v.days}`:` · expiré`}` : `Validité —`}${ l.asOf ? ` · <span class="dim">relevé ${relTime(l.asOf)}</span>` : `` }</div>
      <button class="linkbtn" data-edit="${idx}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Modifier
      </button>
    </div>
    <div class="editor hidden" id="ed${idx}"></div>
  </div>`;
}
function iconFor(kind){
  if(kind==="voice") return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>`;
  if(kind==="data") return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.86a10 10 0 0 1 14 0"/><path d="M8.5 16.43a5 5 0 0 1 7 0"/></svg>`;
  return "";
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function render(){
  const wrap = $("#cards");
  wrap.innerHTML = STATE.lines.map(lineCard).join("");
  const stale = (Date.now() - new Date(STATE.updatedAt)) > 12*3600e3;
  $("#freshDot").className = "dot" + (stale?" stale":"");
  $("#updatedTxt").textContent = "Mis à jour " + relTime(STATE.updatedAt);
  wrap.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => toggleEditor(+b.dataset.edit));
  $("#footNote").innerHTML = usingDemo ? "Données de démonstration — appuyez sur ✎ Modifier pour saisir vos vrais chiffres, ou configurez une source automatique dans ⚙︎ Réglages." : "";
}

/* ---------------- Inline editor (manual entry) ---------------- */
function toggleEditor(idx){
  const box = $("#ed"+idx);
  if(!box.classList.contains("hidden")){ box.classList.add("hidden"); box.innerHTML=""; return; }
  const l = STATE.lines[idx];
  const dv = l.data && !l.data.unlimited ? l.data : {remaining:"",total:"",unit:"Go"};
  const vv = l.voice || {};
  box.innerHTML = `
    <div class="fld"><label>Nom de la ligne</label><input type="text" id="e_label_${idx}" value="${esc(l.label)}"></div>
    <div class="fld"><label>Numéro (optionnel · reste sur cet appareil)</label><input type="tel" inputmode="tel" id="e_num_${idx}" value="${esc(l.id)}" placeholder="06••••••••"></div>
    <div class="fld"><label>Forfait (optionnel)</label><input type="text" id="e_plan_${idx}" value="${esc(l.plan)}" placeholder="ex: Yoxo 100 Go"></div>
    <div class="grid2">
      <div class="fld"><label>Data restante (Go)</label><input type="number" step="0.1" inputmode="decimal" id="e_dr_${idx}" value="${dv.remaining??""}"></div>
      <div class="fld"><label>Data totale (Go)</label><input type="number" step="0.1" inputmode="decimal" id="e_dt_${idx}" value="${dv.total??""}"></div>
    </div>
    <label class="chk"><input type="checkbox" id="e_vinf_${idx}" ${vv.unlimited?"checked":""}> Appels illimités</label>
    <div class="grid2" id="e_vwrap_${idx}" style="${vv.unlimited?"opacity:.4;pointer-events:none":""}">
      <div class="fld"><label>Min. restantes</label><input type="number" inputmode="numeric" id="e_vr_${idx}" value="${vv.unlimited?"":(vv.remaining??"")}"></div>
      <div class="fld"><label>Min. totales</label><input type="number" inputmode="numeric" id="e_vt_${idx}" value="${vv.unlimited?"":(vv.total??"")}"></div>
    </div>
    <div class="fld"><label>Validité (jj/mm/aaaa → aaaa-mm-jj)</label><input type="text" id="e_valid_${idx}" value="${esc(l.validUntil)}" placeholder="2026-07-21"></div>
    <div class="ed-actions">
      <button class="btn ghost sm" data-cancel="${idx}">Annuler</button>
      <button class="btn sm" data-save="${idx}">Enregistrer</button>
    </div>`;
  box.classList.remove("hidden");
  $("#e_vinf_"+idx).onchange = (e)=>{ const w=$("#e_vwrap_"+idx); w.style.opacity=e.target.checked?".4":"1"; w.style.pointerEvents=e.target.checked?"none":"auto"; };
  box.querySelector("[data-cancel]").onclick = ()=>toggleEditor(idx);
  box.querySelector("[data-save]").onclick = ()=>saveEditor(idx);
}
function saveEditor(idx){
  const g = id => $("#"+id+"_"+idx);
  const l = STATE.lines[idx];
  l.label = g("e_label").value.trim() || l.label;
  l.id = g("e_num").value.trim();
  l.plan = g("e_plan").value.trim();
  l.validUntil = g("e_valid").value.trim();
  const dr = num(g("e_dr").value), dt = num(g("e_dt").value);
  l.data = (dr===null && dt===null) ? null : {remaining:dr, total:dt, unit:"Go"};
  if(g("e_vinf").checked){ l.voice = {unlimited:true, unit:"min"}; }
  else{
    const vr=num(g("e_vr").value), vt=num(g("e_vt").value);
    l.voice = (vr===null&&vt===null)?null:{remaining:vr,total:vt,unit:"min"};
  }
  STATE.updatedAt = new Date().toISOString();
  usingDemo = false;
  save(STATE);
  render();
  toast("Ligne mise à jour");
}

/* ---------------- Settings sheet ---------------- */
function openSettings(){
  const cur = localStorage.getItem(LSURL) || CONFIG.DATA_URL || "";
  const el = document.createElement("div");
  el.className = "sheet-wrap"; el.id="sheetWrap";
  el.innerHTML = `
    <div class="sheet">
      <div class="grabber"></div>
      <h3>Réglages</h3>
      <p>Source automatique et confidentialité.</p>
      <div class="fld">
        <label>URL du data.json (mise à jour auto par le téléphone)</label>
        <input type="text" id="setUrl" value="${esc(cur)}" placeholder="https://…/data.json">
      </div>
      <div class="ed-actions" style="margin-bottom:16px">
        <button class="btn ghost sm" id="setClose">Fermer</button>
        <button class="btn sm" id="setSave">Enregistrer</button>
      </div>
      <div class="note">Astuce : hébergez cette page sur GitHub Pages et placez <b>data.json</b> à côté ; laissez l'URL vide et le rafraîchissement lira automatiquement <b>./data.json</b>. Le mot de passe est un verrou local léger : aucun identifiant Yoxo n'est stocké ici.</div>
    </div>`;
  document.body.appendChild(el);
  el.onclick = (e)=>{ if(e.target===el) close(); };
  $("#setClose").onclick = close;
  $("#setSave").onclick = ()=>{ localStorage.setItem(LSURL, $("#setUrl").value.trim()); close(); toast("Réglages enregistrés"); };
  function close(){ el.remove(); }
}

/* ---------------- Refresh ---------------- */
async function refresh(manual){
  const btn = $("#btnRefresh"); btn.classList.add("spin");
  try{
    const url = localStorage.getItem(LSURL) || CONFIG.DATA_URL;
    // If no explicit URL, try same-origin ./data.json (works on GitHub Pages).
    const target = url || (location.protocol.startsWith("http") ? "./data.json" : "");
    if(target){
      const got = await fromRemote(target);
      if(got){ STATE = got; usingDemo=false; save(STATE); render(); toast("Données à jour"); return; }
    }
    if(manual) toast(url ? "Source injoignable" : "Aucune source auto — saisie manuelle");
  }catch(err){
    if(manual) toast("Échec du rafraîchissement");
  }finally{
    setTimeout(()=>btn.classList.remove("spin"), 500);
  }
}

/* ---------------- Toast ---------------- */
let toastT;
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------------- Boot ---------------- */
let usingDemo = false;
function boot(){
  const urlData = fromUrl();
  if(urlData){ STATE = urlData; save(STATE); usingDemo=false; }
  else {
    const cached = fromCache();
    if(cached){ STATE = cached; usingDemo=false; }
    else { STATE = normalize(DEMO); usingDemo = true; }
  }
  render();
  $("#btnRefresh").onclick = ()=>refresh(true);
  $("#btnSettings").onclick = openSettings;
  // Try a silent auto-refresh on open ("live on load") if a source is configured.
  refresh(false);
}

/* ---------------- Init ---------------- */
$("#gateForm").addEventListener("submit", checkPw);
if(sessionStorage.getItem(SESSION)==="1"){ openApp(); } else { setTimeout(()=>$("#pw").focus(), 200); }
</script>
</body>
</html>
